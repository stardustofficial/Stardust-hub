<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stardust Hub - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child, update, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration Matrix
        // TODO: Replace with your actual Firebase project config credentials
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        window.authModule = { auth, signInWithPopup, provider, signOut, db, ref, set, get, child, update, onValue, push };
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0b1528',
                        darkcard: '#1e293b',
                        accentblue: '#2563eb',
                        neoncyan: '#06b6d4',
                        premiumGold: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b1528; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .theme-soft-cyan { background-image: linear-gradient(135deg, #0b1528 70%, #083344 100%) !important; border-color: #06b6d4 !important; }
        .theme-soft-pink { background-image: linear-gradient(135deg, #0b1528 70%, #4c0519 100%) !important; border-color: #f43f5e !important; }
        .theme-soft-purple { background-image: linear-gradient(135deg, #0b1528 70%, #3b0764 100%) !important; border-color: #a855f7 !important; }
        .theme-soft-emerald { background-image: linear-gradient(135deg, #0b1528 70%, #022c22 100%) !important; border-color: #10b981 !important; }

        .vip-font-serif { font-family: 'Playfair Display', Georgia, serif; font-style: italic; }
        .vip-font-mono { font-family: 'Fira Code', Courier, monospace; letter-spacing: -0.5px; }
        .vip-font-display { font-family: 'Impact', sans-serif; tracking: 1px; }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen flex flex-col justify-between overflow-x-hidden select-none">

    <div id="login-screen" class="fixed inset-0 flex flex-col items-center justify-center p-6 bg-darkbg z-50">
        <div class="text-center max-w-sm w-full bg-darkcard p-8 rounded-3xl border border-slate-800 shadow-2xl">
            <h1 class="text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">STARDUST</h1>
            <p class="text-slate-500 text-xs mb-8">Secure Identity Verification Portal</p>
            <button onclick="handleGoogleOAuthLogin()" class="w-full flex items-center justify-center space-x-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 py-3 px-4 rounded-xl transition duration-200">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22-.03-.63z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>

                <span class="text-sm font-semibold">Access with Google OAuth</span>

            <section id="chat-screen" class="hidden space-y-4">

                    <h2 class="text-lg font-bold text-slate-300">Active Signals</h2>

                        <button onclick="toggleElement('chat-menu')" class="text-slate-400 p-2 bg-darkcard rounded-xl border border-slate-800">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>

                    <button onclick="openModal('settings-hub-modal')" class="absolute top-4 right-4 p-2 bg-slate-800 rounded-xl border border-slate-700 text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    </button>

                        </div>
                        <h3 class="text-base font-bold text-slate-100 flex items-center gap-1">
                            <span id="profile-display-name">Loading...</span>
                        </h3>
                        
                        <div class="flex items-center space-x-2 mt-1 bg-slate-900/50 px-3 py-1.5 rounded-xl border border-slate-800">
                            <span class="text-xs text-slate-400 font-mono">UID:</span>
                            <input type="text" id="profile-uid-input" class="bg-transparent font-mono text-xs text-cyan-400 focus:outline-none w-28 text-center" value="">

                    </div>
                </div>

                <div class="space-y-2 pt-2">
                    <h4 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 pl-1">Personal Ledger</h4>
                    <div id="profile-personal-posts" class="space-y-4"></div>
                </div>

            <button onclick="switchTab('chat')" class="text-slate-500 hover:text-cyan-400 flex flex-col items-center flex-1 py-2 transition relative">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>

        </nav>
    </div>

    <div id="inspector-profile-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-darkcard w-full max-w-sm rounded-3xl border border-slate-800 p-6 flex flex-col relative shadow-2xl">
            <button onclick="closeModal('inspector-profile-modal')" class="absolute top-4 right-4 text-slate-500 hover:text-white text-sm">✕</button>
            <div class="flex flex-col items-center text-center mt-2">
                <img id="inspector-avatar" src="" class="w-20 h-20 rounded-full border border-slate-700 object-cover mb-3">
                <h3 id="inspector-name" class="text-base font-bold text-slate-100">User Handle</h3>
                <p id="inspector-uid" class="text-xs text-slate-500 font-mono mt-0.5">@uid</p>
                <p id="inspector-bio" class="text-xs text-slate-400 mt-3 leading-relaxed">No description uploaded.</p>
                
                <div id="inspector-action-container" class="mt-6 w-full">
                    </div>
            </div>
        </div>
    </div>

    <div id="settings-hub-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-darkcard w-full max-w-sm rounded-3xl border border-slate-800 shadow-2xl p-6 flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400">Settings Engine</h3>
                <button onclick="closeModal('settings-hub-modal')" class="text-slate-500 hover:text-white">✕</button>
            </div>
            <div class="space-y-2 overflow-y-auto flex-1 pr-1 custom-scrollbar">
                <button onclick="executeLogout()" class="w-full bg-red-950/40 border border-red-900/40 text-left p-3.5 rounded-xl text-xs font-bold text-red-400 flex justify-between hover:bg-red-900/30 transition"><span>Terminate Active Session</span><span>⇥</span></button>
            </div>
        </div>
    </div>

    <div id="post-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-darkcard w-full max-w-sm rounded-2xl border border-slate-800 p-5 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Draft Content</h3>
                <button onclick="closeModal('post-modal')" class="text-slate-500 hover:text-white">✕</button>
            </div>
            <textarea id="post-input-text" placeholder="Formulate broadcast transmission payload to all nodes..." class="w-full h-28 p-3 border border-slate-800 bg-darkbg rounded-xl text-slate-200 text-xs focus:outline-none focus:border-slate-700 resize-none mb-3"></textarea>
            <button onclick="processPublicationInit()" class="w-full bg-blue-600 hover:bg-blue-700 py-2.5 rounded-xl text-xs font-bold transition">Broadcast Network-wide</button>
        </div>
    </div>

    <div id="chat-window-modal" class="hidden fixed inset-0 bg-darkbg z-50 flex flex-col max-w-md mx-auto w-full h-full border-x border-slate-900 shadow-2xl">
        <header class="p-4 bg-darkcard border-b border-slate-900 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img id="chat-window-avatar" src="" class="w-8 h-8 rounded-full border border-slate-700 object-cover">
                <div>
                    <h3 id="chat-window-name" class="text-xs font-bold">User Matrix</h3>
                    <p id="chat-window-uid" class="text-[9px] text-slate-500 font-mono"></p>
                </div>
            </div>
            <button onclick="closeChatWindow()" class="text-slate-400 bg-slate-800 px-3 py-1 rounded-xl text-xs font-bold">Close Stream</button>
        </header>
        
        <div id="chat-messages-stream" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar text-xs flex flex-col"></div>
        
        <footer class="p-3 bg-darkcard border-t border-slate-900 flex items-center space-x-2">
            <input type="text" id="chat-input-field" placeholder="Enter clean message stream packet..." class="flex-1 bg-darkbg border border-slate-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-slate-700">
            <button onclick="dispatchDirectMessage()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl text-xs font-bold shrink-0">Send</button>
        </footer>
    </div>

    <script>
        let localUserSession = null;
        let registeredUsers = {};
        let activeTargetChatUID = null;

        // Auto-bootstrap login setup checks for continuous persistence
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (!window.authModule) {
                    console.error("Firebase runtime failed to initialize properly.");
                    return;
                }
                
                // Realtime active listener tracking state session persistence
                window.authModule.onAuthStateChanged(window.authModule.auth, (user) => {
                    if (user) {
                        localUserSession = user;
                        initializeDatabaseSync(user);
                    } else {
                        document.getElementById('login-screen').classList.remove('hidden');
                        document.getElementById('app-layout').classList.add('hidden');
                    }
                });
            }, 1000);
        });

        // Google OAuth Trigger Method
        function handleGoogleOAuthLogin() {
            if(!window.authModule) return alert("Firebase setup running...");
            window.authModule.signInWithPopup(window.authModule.auth, window.authModule.provider)
            .then((result) => {
                // Persistent Authentication Setup Complete
            }).catch((error) => {
                console.error("Authentication handshake abort:", error);
                alert("Authentication Interrupted.");
            });
        }

        // Live Realtime Synchronization Core Pipeline
        function initializeDatabaseSync(user) {
            const { db, ref, onValue, set, get, child } = window.authModule;
            
            // Sync all ecosystem registration indices
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                registeredUsers = snapshot.val() || {};
                
                // If local node doesn't exist, execute initial cloud bootstrap map
                if (!registeredUsers[user.uid]) {
                    // Generate unique default alpha numeric identifier hash
                    const calculatedUID = "str_" + Math.random().toString(36).substring(2, 7);
                    const freshProfile = {
                        uid: calculatedUID,
                        name: user.displayName || "Anonymous Node",
                        pfp: user.photoURL || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150",
                        bio: "Connected via Google Engine Module.",
                        firebaseUID: user.uid
                    };
                    set(ref(db, 'users/' + user.uid), freshProfile);
                } else {
                    document.getElementById('profile-uid-input').value = registeredUsers[user.uid].uid;
                    syncProfileUI();
                }
            });

            // Sync global publications broadcast feed
            const postsRef = ref(db, 'posts');
            onValue(postsRef, (snapshot) => {
                const postsData = snapshot.val() || {};
                const list = Object.values(postsData).reverse();
                renderTimelineUI(list);
            });

            // Live synchronization pipelines for operational UI loops
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-layout').classList.remove('hidden');
        }

        // Action command handler to reset custom UIDs securely
        function updatePersonalUID() {
            if(!localUserSession) return;
            const chosenUID = document.getElementById('profile-uid-input').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, "");
            if(chosenUID.length < 3) return alert("UID handle length too short.");

            const { db, ref, update } = window.authModule;
            update(ref(db, 'users/' + localUserSession.uid), { uid: chosenUID })
            .then(() => alert("Ecosystem Identity Routing Handle Updated."))
            .catch(() => alert("Handshake failure updating matrix."));
        }

        // Global network-wide real notification feed compilation
        function processPublicationInit() {
            const txt = document.getElementById('post-input-text').value.trim();
            if(!txt) return alert("Cannot broadcast blank streams.");

            const { db, ref, push } = window.authModule;
            const userProfile = registeredUsers[localUserSession.uid];

            const newPost = {
                id: Date.now(),
                authorName: userProfile.name,
                authorUID: userProfile.uid,
                authorPic: userProfile.pfp,
                content: txt,
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            push(ref(db, 'posts'), newPost).then(() => {
                document.getElementById('post-input-text').value = "";
                closeModal('post-modal');
            });
        }

        // Live rendering mechanics tracking individual structural feeds
        function renderTimelineUI(posts) {
            const feed = document.getElementById('posts-feed');
            const personalFeed = document.getElementById('profile-personal-posts');
            feed.innerHTML = "";
            if(personalFeed) personalFeed.innerHTML = "";

            const activeUID = registeredUsers[localUserSession.uid]?.uid;

            posts.forEach(p => {
                const el = `
                    <div class="bg-darkcard p-4 rounded-2xl border border-slate-900 shadow-md">
                        <div class="flex items-center space-x-3 mb-2 cursor-pointer" onclick="lookupExternalProfile('${p.authorUID}')">
                            <img src="${p.authorPic}" class="w-8 h-8 rounded-full object-cover border border-slate-800">
                            <div>
                                <h4 class="text-xs font-bold text-slate-200">${p.authorName}</h4>
                                <p class="text-[10px] text-slate-500 font-mono">@${p.authorUID} • ${p.timestamp || ''}</p>
                            </div>
                        </div>
                        <p class="text-xs text-slate-300 leading-relaxed">${p.content}</p>
                    </div>
                `;
                feed.innerHTML += el;

                if(personalFeed && p.authorUID === activeUID) {
                    personalFeed.innerHTML += el;
                }
            });
        }

        // Unified cross-identity lookup engines inside search matrices
        function handleUnifiedSearch() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const grid = document.getElementById('search-results-grid');
            grid.innerHTML = "";

            if(!query) return;

            Object.values(registeredUsers).forEach(u => {
                if(u.uid.toLowerCase().includes(query) || u.name.toLowerCase().includes(query)) {
                    grid.innerHTML += `
                        <div class="bg-darkcard p-3 rounded-xl border border-slate-800 flex justify-between items-center">
                            <div class="flex items-center space-x-3 cursor-pointer" onclick="lookupExternalProfile('${u.uid}')">
                                <img src="${u.pfp}" class="w-8 h-8 rounded-full object-cover">
                                <div>
                                    <h4 class="text-xs font-bold">${u.name}</h4>
                                    <p class="text-[10px] font-mono text-slate-500">@${u.uid}</p>
                                </div>
                            </div>
                            <button onclick="lookupExternalProfile('${u.uid}')" class="bg-blue-600 px-3 py-1 rounded-lg text-[11px] font-bold">Inspect Node</button>
                        </div>
                    `;
                }
            });
        }

        // Profile Inspector Architecture Module
        function lookupExternalProfile(targetUID) {
            const target = Object.values(registeredUsers).find(u => u.uid === targetUID);
            if(!target) return alert("System data index mismatch.");

            document.getElementById('inspector-avatar').src = target.pfp;
            document.getElementById('inspector-name').innerText = target.name;
            document.getElementById('inspector-uid').innerText = "@" + target.uid;
            document.getElementById('inspector-bio').innerText = target.bio || "No status uploaded.";

            const actions = document.getElementById('inspector-action-container');
            actions.innerHTML = "";

            const self = registeredUsers[localUserSession.uid];
            if(self.uid !== target.uid) {
                actions.innerHTML = `
                    <div class="flex flex-col space-y-2">
                        <button onclick="sendEcosystemHandshake('${target.firebaseUID}')" class="w-full bg-blue-600 font-bold py-2 rounded-xl text-xs">Send Connection/Message Signal</button>
                    </div>
                `;
            }

            openModal('inspector-profile-modal');
        }

        // Trigger dynamic mapping loops for private message generation
        function sendEcosystemHandshake(targetFirebaseUID) {
            closeModal('inspector-profile-modal');
            launchDirectChatSession(targetFirebaseUID);
        }

        // Realtime Private Messaging Pipeline Controller
        function launchDirectChatSession(peerFirebaseUID) {
            activeTargetChatUID = peerFirebaseUID;
            const peer = registeredUsers[peerFirebaseUID];
            if(!peer) return;

            document.getElementById('chat-window-avatar').src = peer.pfp;
            document.getElementById('chat-window-name').innerText = peer.name;
            document.getElementById('chat-window-uid').innerText = "@" + peer.uid;

            openModal('chat-window-modal');
            listenToChatStream(peerFirebaseUID);
        }

        // Listening engine binding messages into structured timelines
        function listenToChatStream(peerUID) {
            const { db, ref, onValue } = window.authModule;
            const selfUID = localUserSession.uid;
            const threadID = selfUID < peerUID ? `${selfUID}_${peerUID}` : `${peerUID}_${selfUID}`;

            onValue(ref(db, 'chats/' + threadID), (snapshot) => {
                const msgs = snapshot.val() || {};
                const stream = document.getElementById('chat-messages-stream');
                stream.innerHTML = "";

                Object.values(msgs).forEach(m => {
                    const isSelf = m.sender === selfUID;
                    const alignment = isSelf ? 'self-end bg-blue-600 text-white' : 'self-start bg-slate-800 text-slate-200';
                    stream.innerHTML += `
                        <div class="max-w-[75%] p-2.5 rounded-2xl ${alignment} mb-1 flex flex-col">
                            <span>${m.body}</span>
                            <span class="text-[8px] text-slate-400 self-end mt-0.5">${m.timestamp || ''}</span>
                        </div>
                    `;
                });
                stream.scrollTop = stream.scrollHeight;
            });
        }

        // Send chat streams to DB instantly
        function dispatchDirectMessage() {
            const input = document.getElementById('chat-input-field');
            const body = input.value.trim();
            if(!body || !activeTargetChatUID) return;

            const { db, ref, push } = window.authModule;
            const selfUID = localUserSession.uid;
            const threadID = selfUID < activeTargetChatUID ? `${selfUID}_${activeTargetChatUID}` : `${activeTargetChatUID}_${selfUID}`;

            const payload = {
                sender: selfUID,
                body: body,
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            push(ref(db, 'chats/' + threadID), payload).then(() => {
                input.value = "";
            });
        }

        function closeChatWindow() {
            closeModal('chat-window-modal');
            activeTargetChatUID = null;
        }

        // Interface synchronization helpers
        function syncProfileUI() {
            const profile = registeredUsers[localUserSession?.uid];
            if(!profile) return;
            document.getElementById('profile-display-name').innerText = profile.name;
            document.getElementById('profile-display-avatar').src = profile.pfp;
            document.getElementById('profile-display-uid').innerText = "@" + profile.uid;
        }

        function switchTab(tabId) {
            ['home-screen', 'chat-screen', 'search-screen', 'profile-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(tabId + '-screen').classList.remove('hidden');

            if(tabId === 'chat') {
                renderActiveChatsGrid();
            }
        }

        function renderActiveChatsGrid() {
            const grid = document.getElementById('active-chats-list');
            grid.innerHTML = "";
            
            Object.values(registeredUsers).forEach(u => {
                if(u.firebaseUID !== localUserSession.uid) {
                    grid.innerHTML += `
                        <div onclick="launchDirectChatSession('${u.firebaseUID}')" class="bg-darkcard p-3 rounded-xl border border-slate-900 flex items-center space-x-3 cursor-pointer hover:border-slate-800 transition">
                            <img src="${u.pfp}" class="w-9 h-9 rounded-full object-cover">
                            <div>
                                <h4 class="text-xs font-bold">${u.name}</h4>
                                <p class="text-[10px] text-slate-500 font-mono">Open continuous sync pipeline</p>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function switchChatSubView(view) {
            toggleElement('chat-menu');
            if(view === 'active') {
                document.getElementById('active-chats-list').classList.remove('hidden');
                document.getElementById('incoming-requests-list').classList.add('hidden');
            }
        }

        function executeLogout() {
            if(window.authModule) {
                window.authModule.signOut(window.authModule.auth).then(() => {
                    window.location.reload();
                });
            }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function toggleElement(id) { document.getElementById(id).classList.toggle('hidden'); }
    </script>
</body>
</html>
